  <!-- Stream row y=55 -->
  <!-- Frame 0 -->
  <rect x="20"  y="45" width="40"  height="34" fill="#f38ba8" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="60"  y="45" width="220" height="34" fill="#a6e3a1" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Frame 1 -->
  <rect x="280" y="45" width="40"  height="34" fill="#f38ba8" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="320" y="45" width="220" height="34" fill="#a6e3a1" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Frame 2 -->
  <rect x="540" y="45" width="40"  height="34" fill="#f38ba8" stroke="#1e1e2e" stroke-width="1"/>
  <rect x="580" y="45" width="180" height="34" fill="#a6e3a1" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Ellipsis -->
